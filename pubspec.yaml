name: base_flutter
description: Mashaghel Hayde (provider) - re-platformed on Flutter 3.38 / Dart 3.10.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  dio: ^5.9.2
  crypto: ^3.0.7
  path: ^1.9.1
  quiver: ^3.2.2
  sqflite: '>=2.3.0 <3.0.0'
  shared_preferences: ^2.5.5
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1
  google_maps_flutter: ^2.17.1
  geocoding: ^4.0.0
  geolocator: ^14.0.3
  flutter_google_places_sdk: ^0.4.3     # was flutter_google_places + google_maps_webservice (abandoned)
  map_launcher: ^4.5.0
  bloc: ^9.2.1
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  flutter_staggered_animations: ^1.1.1
  liquid_pull_to_refresh: ^3.0.1
  flutter_spinkit: ^5.2.2
  google_fonts: ^8.1.0
  cached_network_image: ^3.4.1
  fluttertoast: '>=8.2.0 <10.0.0'
  photo_view: ^0.15.0
  flutter_easyloading: ^3.0.5
  share_plus: ^12.0.2                    # win32 5.x (file_picker needs win32 5; v13=win32 6 conflicts)
  flutter_rounded_date_picker: ^3.0.4
  material_design_icons_flutter: ^7.0.7296
  flutter_html: ^3.0.0
  animations: ^2.2.0
  modal_bottom_sheet: ^3.0.0
  pin_code_fields: ^8.0.1                # v9 changed maintainer/API; v8 keeps classic widgets
  image_picker: ^1.2.2
  flutter_svg: ^2.3.0
  flutter_rating_bar: ^4.0.1            # moved from dev_dependencies (used in app)
  url_launcher: ^6.3.2
  intl: ^0.20.2
  tf_validator: ^0.0.2
  platform: ^3.1.6
  json_annotation: ^4.12.0
  # ---- provider-specific (files/downloads) ----
  flutter_downloader: ^1.12.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  android_path_provider: ^0.3.0
  file_picker: ^8.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/appicon.png"

flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/anim/
    - assets/images/
    - assets/lang/




dependency_overrides:
  win32: ^5.11.0
  package_info_plus: 9.0.1                 # win32 5.x (geolocator pulls v10=win32 6, conflicts with file_picker)
